version: '3.9'

services:
  # API Gateway Service
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        NODE_ENV: production
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - API_VERSION=v1
      - RATE_LIMIT_PER_MINUTE=60
      - ENABLE_MTLS=true
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis-password}
      - REDIS_USERNAME=default
      - KMS_KEY_ID=test-key-id
      - AWS_REGION=us-east-1
    depends_on:
      - redis
    networks:
      - frontend
      - backend
    volumes:
      - ./secrets:/run/secrets:ro

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-password} --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_USERNAME=default
    volumes:
      - redis_data:/data
      - ./secrets:/run/secrets:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # MongoDB Service
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=auth
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge